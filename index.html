<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LASE Demo Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">

<div class="container vh-100 d-flex align-items-center justify-content-center">

<div class="login-card p-4">
<h4 class="mb-3 text-center">Welcome to <span style="color:#4b2aad ;">Richards Bank</span></h4>

<input id="name" class="form-control mb-3" placeholder="Your Name">
<input id="email" class="form-control mb-3" placeholder="Email">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100">Login</button>

<p class="text-center mt-3 text-muted">Demo Login</p>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
